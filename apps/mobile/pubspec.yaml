name: agrix_mobile
description: "Agrix - Agricultural Sales & Inventory Management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0

  # State Management
  provider: ^6.1.1

  # Database (Offline-first)
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.9.0

  # Networking
  dio: ^5.4.1
  connectivity_plus: ^6.0.3

  # Scanning & Codes
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # Printing
  flutter_blue_plus: ^1.31.0

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  json_annotation: ^4.8.1

  # Shared package
  agrix_shared:
    path: ../../packages/shared/dart

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.15.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
